# Promtail 設定ファイル
# Docker コンテナログを収集し、Loki に送信する

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Docker コンテナログの収集
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          # financial_planning 関連のコンテナのみ収集
          - name: name
            values:
              - "financial_planning_backend"
              - "financial_planning_db"
              - "financial_planning_frontend"
    relabel_configs:
      # コンテナ名をラベルに追加
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: "container"
      # サービス名を抽出（docker-compose のサービス名）
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: "service"
      # プロジェクト名
      - source_labels: ["__meta_docker_container_label_com_docker_compose_project"]
        target_label: "project"
    pipeline_stages:
      # Docker のログフォーマットをパース
      - docker: {}
      # JSON 構造化ログのパース（slog 出力）
      - json:
          expressions:
            level: level
            msg: msg
            request_id: request_id
            user_id: user_id
            operation: operation
            timestamp: time
      # level ラベルを追加（ログレベルでフィルタリング可能に）
      - labels:
          level:
      # タイムスタンプを抽出
      - timestamp:
          source: timestamp
          format: "2006-01-02T15:04:05.999999999Z07:00"
          fallback_formats:
            - "2006-01-02T15:04:05Z07:00"
