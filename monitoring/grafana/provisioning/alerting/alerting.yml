# Grafana アラートプロビジョニング (Grafana 9.x+ 形式)
# Prometheusのアラートルールと重複を避けるため、Grafana Managed Alertsのルールは定義しない。
# 通知チャンネル（コンタクトポイント）のプロビジョニングのみ行う。

apiVersion: 1

contactPoints:
  - orgId: 1
    name: slack-notifications
    receivers:
      - uid: slack-receiver-uid
        type: slack
        settings:
          url: 'https://hooks.slack.com/services/DUMMY/DUMMY/DUMMY'
          recipient: '#alerts'
          title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
          text: |
            {{ range .Alerts }}
            *{{ .Annotations.summary }}*
            {{ .Annotations.description }}
            重篤度: {{ .Labels.severity }}
            {{ end }}
        disableResolveMessage: false

policies:
  - orgId: 1
    receiver: slack-notifications
    group_by:
      - alertname
      - severity
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 12h
