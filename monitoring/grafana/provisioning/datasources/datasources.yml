# Grafana データソース自動プロビジョニング
# Prometheus + Loki を起動時に自動登録する

apiVersion: 1

datasources:
  # Prometheus（メトリクス）
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  # Loki（ログ）
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      maxLines: 1000
