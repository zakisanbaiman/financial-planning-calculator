# Grafana ダッシュボード自動プロビジョニング
# 起動時にダッシュボード JSON を自動インポートする

apiVersion: 1

providers:
  - name: "Financial Planning Calculator"
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    editable: true
    options:
      path: /etc/grafana/provisioning/dashboards/json
      foldersFromFilesStructure: false
