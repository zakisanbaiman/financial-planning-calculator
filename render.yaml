services:
  # Backend API Service
  - type: web
    name: financial-planning-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    dockerCommand: ""
    plan: free
    region: oregon
    healthCheckPath: /health
    preDeployCommand: ./migrate
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_SSLMODE
        value: require
      - key: GIN_MODE
        value: release
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION
        value: 24h
    buildFilter:
      paths:
        - backend/**
    
  # Frontend Web Service
  - type: web
    name: financial-planning-frontend
    env: docker
    dockerfilePath: ./frontend/Dockerfile.prod
    dockerContext: ./frontend
    plan: free
    region: oregon
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NODE_ENV
        value: production
    buildFilter:
      paths:
        - frontend/**
